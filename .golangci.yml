# golangci-lint config — aligned with Lex rules
# go-best-practices, code-smells, naming, hexagonal-architecture, solid-principles

run:
  timeout: 5m
  build-tags:
    - e2e
  tests: true

linters:
  disable-all: true
  enable:
    # --- Default / essential ---
    - errcheck        # go-best-practices §2: never swallow errors
    - govet           # go vet checks (shadow, printf, etc.)
    - staticcheck     # comprehensive static analysis
    - unused          # dead code detection
    - ineffassign     # useless assignments
    - gosimple        # simplification suggestions
    - typecheck       # type checking

    # --- Lex: go-best-practices ---
    - goconst         # §1: constants over embedded literals
    - errorlint       # §2: wrap errors with %w, use errors.Is/As
    - nestif          # §3: max nesting depth
    - gocritic        # §3+§4: switch over if-else, modern APIs
    - bodyclose       # §6: resource cleanup (HTTP response bodies)
    - prealloc        # §7: pre-allocate slices when length known
    - thelper         # §12: t.Helper() in test helpers

    # --- Lex: code-smells ---
    - gocyclo         # cyclomatic complexity
    - funlen          # function length
    - dupl            # code duplication

    # --- Lex: naming ---
    - revive          # naming conventions, style
    - misspell        # typos in comments and strings

    # --- Lex: hexagonal-architecture + solid ---
    - depguard        # dependency direction enforcement
    - goimports       # import grouping and formatting
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters

    # --- Security ---
    - gosec           # security issues (Lex: security-analysis)

linters-settings:
  errcheck:
    check-type-assertions: false
    exclude-functions:
      - (*encoding/json.Encoder).Encode
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln

  goconst:
    min-len: 2
    min-occurrences: 3          # flag when same literal appears 3+ times

  errorlint:
    errorf: true                # check fmt.Errorf uses %w
    asserts: true               # check errors.As usage
    comparison: true            # check errors.Is usage

  nestif:
    min-complexity: 4           # flag nesting deeper than 3 levels

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated

  gocyclo:
    min-complexity: 15          # flag functions with cyclomatic > 15

  funlen:
    lines: 100                  # flag functions > 100 lines
    statements: 60              # flag functions > 60 statements

  dupl:
    threshold: 100              # flag duplicated blocks > 100 tokens

  misspell:
    locale: US

  revive:
    rules:
      - name: exported
        disabled: true          # we don't require doc comments on every export
      - name: unexported-return
        disabled: false
      - name: blank-imports
        disabled: false
      - name: context-as-argument
        disabled: false
      - name: error-return
        disabled: false
      - name: error-naming
        disabled: false
      - name: increment-decrement
        disabled: false
      - name: var-declaration
        disabled: false
      - name: range
        disabled: false
      - name: receiver-naming
        disabled: false

  depguard:
    rules:
      main:
        deny:
          - pkg: "log"
            desc: "use slog or djinnlog instead of stdlib log"

  prealloc:
    simple: true
    range-loops: true
    for-loops: false            # too noisy for complex loops

  thelper:
    test:
      begin: true               # t.Helper() must be first statement

issues:
  exclude-use-default: true
  max-issues-per-linter: 0      # show all issues (no cap)
  max-same-issues: 0            # show all instances
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - funlen
        - dupl
        - goconst
        - gosec
    - path: testkit/
      linters:
        - errcheck
        - unused
        - funlen
    - path: cmd/
      linters:
        - funlen
